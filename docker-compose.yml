services:
  postgres:
    image: postgres:16
    container_name: agenthq-postgres
    environment:
      POSTGRES_DB: agenthq
      POSTGRES_USER: agenthq
      POSTGRES_PASSWORD: agenthq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthq -d agenthq"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agenthq-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://agenthq:agenthq@postgres:5432/agenthq
      BACKEND_CORS_ORIGINS: http://localhost:5173
      APP_NAME: AgentHQ
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - api_venv:/app/.venv
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  api_venv:
